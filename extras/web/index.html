<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<title>deen</title>
		<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
		<script src="wasm_exec.js"></script>
	</head>
	<body>
		<main id="wasm-fallback">
			<h1>deen requires WebAssembly</h1>
			<p>This browser could not start the deen web interface. Use a browser with WebAssembly enabled, or use the desktop/CLI version of deen.</p>
		</main>
		<noscript>
			<main>
				<h1>JavaScript is required</h1>
				<p>The deen web interface runs locally in your browser using WebAssembly and JavaScript.</p>
			</main>
		</noscript>
		<script>
			function showStartupError(message) {
				const fallback = document.getElementById("wasm-fallback");
				if (!fallback) {
					return;
				}
				const detail = document.createElement("p");
				detail.textContent = message;
				fallback.appendChild(detail);
			}

			async function instantiateWasm(go) {
				const response = await fetch("deen.wasm");
				if (!response.ok) {
					throw new Error(`failed to download deen.wasm: HTTP ${response.status}`);
				}
				if (WebAssembly.instantiateStreaming) {
					try {
						return await WebAssembly.instantiateStreaming(response, go.importObject);
					} catch (err) {
						const bytes = await (await fetch("deen.wasm")).arrayBuffer();
						return await WebAssembly.instantiate(bytes, go.importObject);
					}
				}
				const bytes = await response.arrayBuffer();
				return await WebAssembly.instantiate(bytes, go.importObject);
			}

			if (!("WebAssembly" in window)) {
				showStartupError("WebAssembly is not available in this browser.");
			} else {
				const go = new Go();
				instantiateWasm(go).then((result) => {
					go.run(result.instance);
				}).catch((err) => {
					showStartupError(err instanceof Error ? err.message : String(err));
				});
			}
		</script>
	</body>
</html>
