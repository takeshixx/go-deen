# Sample hardened nginx config for hosting the deen web interface.
#
# deen runs entirely in the browser (WebAssembly); the server only ships static
# files, so the attack surface is just a static file host.
#
# Build the assets with `make web-assets`, then copy these into the root below:
#   index.html  main.js  style.css  wasm_exec.js  deen.wasm
# Optionally pre-compress for bandwidth: `gzip -9 -k deen.wasm` (and enable
# gzip_static below).

server {
    listen 80;
    listen [::]:80;
    server_name deen.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name deen.example.com;

    ssl_certificate     /etc/letsencrypt/live/deen.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deen.example.com/privkey.pem;

    root /var/www/deen;
    index index.html;

    # Everything stays same-origin; 'wasm-unsafe-eval' is required to compile
    # the WebAssembly module.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; connect-src 'self'; img-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    gzip on;
    gzip_types application/javascript application/wasm text/css text/html;
    # gzip_static on;   # serve pre-generated *.gz (needs ngx_http_gzip_static_module)

    # nginx >= 1.21 already maps .wasm to application/wasm; this is a fallback.
    # No add_header here so the server-level security headers are inherited.
    location ~ \.wasm$ {
        default_type application/wasm;
        expires 1h;
    }

    location = /index.html { expires -1; }   # always revalidate the entry point
    location / {
        try_files $uri $uri/ =404;
        expires 1h;
    }
}
