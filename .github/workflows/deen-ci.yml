name: Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    
jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.26.x"]

    steps:
    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}


    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Get dependencies
      run: go mod download

    - name: Clean
      run: make clean

    - name: Build Default
      run: make
    
    - name: Clean
      run: make clean
    
    - name: Build Stripped
      run: make stripped
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
          name: deen-${{ matrix.os }}
          path: bin/deen*

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.26.x"]

    steps:
    - name: Setup Go environment
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}


    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Test
      run: make test
